<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Beyond Hangeul</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0b1728;
        color: #f8fafc;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
      }
      a {
        color: #fbbf24;
        text-decoration: none;
      }
      .card {
        max-width: 480px;
        width: 100%;
        background: rgba(15, 26, 50, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 24px;
        padding: 2rem;
      }
      h1 {
        margin-top: 0;
        font-size: 2rem;
      }
      p {
        margin: 1rem 0;
        color: #cbd5e1;
      }
      .button {
        display: inline-flex;
        padding: 0.85rem 1.25rem;
        border-radius: 9999px;
        background: #f59e0b;
        color: #0f172a;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Offline mode</h1>
      <p>Your app is currently offline. Dynamic content requires an internet connection.</p>
      <p>Previously downloaded PDF lessons may still be available for reading.</p>
      <a class="button" href="/">Return to Home</a>
    </div>
  </body>
</html>
